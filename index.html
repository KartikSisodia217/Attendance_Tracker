<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth_loading_overlay" class="auth-loading-overlay">
    <div class="spinner"></div>
    <div id="auth_loading_text" class="loading-text">Signing in...</div>
  </div>

  <div id="login_screen" class="login-screen">
    <div class="login-box">
      <img src="assets/logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
      <h1 class="login-title">Attendance Tracker</h1>
      <p class="login-tagline">Track smarter. Stress less.</p>
      <button class="google-btn" onclick="handle_auth_click()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" class="google-icon">
        Continue with Google
      </button>
    </div>
  </div>

  <div id="main_app" class="app-container hidden">
    
    <!-- ✨ NEW: Mobile Overlay Added Here ✨ -->
    <div id="mobile_sidebar_overlay" class="mobile-overlay" onclick="toggle_mobile_sidebar()"></div>

    <aside class="sidebar">
      <div class="brand">
        Attendance Tracker
        <button class="mobile-close-btn" onclick="toggle_mobile_sidebar()">✖</button>
      </div>

      <div id="user_profile_container" class="user-profile">
        <div class="user-welcome" id="user_welcome_text">Welcome</div>
      </div>

      <button class="btn" onclick="open_add_subject_modal()">+ Add Subject</button>

      <div class="section-title">Attendance Overview</div>
      <div class="stats-list" id="stats_list_container"></div>

      <button class="user-logout-btn" onclick="handle_auth_click()">Logout</button>
    </aside>

    <main class="main-area">
      <div class="toolbar">
        <div style="display: flex; align-items: center;">
          <button class="mobile-menu-btn" onclick="toggle_mobile_sidebar()">☰</button>
          <div class="nav-controls desktop-nav-controls">
            <button class="nav-btn" onclick="navigate_calendar_weeks(-1)">◀ Prev</button>
            <button class="nav-btn" onclick="navigate_to_current_week()">Today</button>
            <button class="nav-btn" onclick="navigate_calendar_weeks(1)">Next ▶</button>
            <h2 id="current_week_display_label">May 2026</h2>
          </div>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="nav-btn" onclick="open_interface_modal('weekly_slot_modal')">+ Add Weekly Slot</button>
          <button class="nav-btn" onclick="open_interface_modal('extra_class_modal')">+ Add Extra Class</button>
        </div>
      </div>

      <div class="calendar-container">
        <div class="calendar-header" id="calendar_header_container"></div>
        <div class="calendar-body" id="calendar_body_container"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="subject_creation_modal">
    <div class="modal-box">
      <div class="modal-title" id="subject_modal_title_text">Add Subject</div>
      <form id="subject_input_form">
        <div class="form-group"><label>Subject Name</label><input type="text" id="subject_name_input" required placeholder="e.g. Mathematics"></div>
        <div class="form-group"><label>Subject Code</label><input type="text" id="subject_code_input" required placeholder="e.g. MA101"></div>
        <div class="form-group"><label>Target Attendance %</label><input type="number" id="subject_target_input" min="1" max="100" required value="75"></div>
        <div class="form-group"><label>Subject Color</label><div class="color-picker" id="color_selection_container"></div><input type="hidden" id="subject_color_input" required></div>
        <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="close_all_interface_modals()">Cancel</button><button type="submit" class="btn">Save</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="weekly_slot_modal">
    <div class="modal-box">
      <div class="modal-title">Add Weekly Slot</div>
      <form id="weekly_slot_form">
        <div class="form-group"><label>Subject</label><select id="slot_subject_selection" required></select></div>
        <div class="form-group">
          <label>Day</label>
          <select id="slot_day_selection" required>
            <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option>
          </select>
        </div>
        <div class="form-group">
          <label>Start Time (24h)</label>
          <select id="slot_start_time_selection" required>
            <option value="8">08:00</option><option value="9">09:00</option><option value="10">10:00</option><option value="11">11:00</option><option value="12">12:00</option><option value="13">13:00</option><option value="14">14:00</option><option value="15">15:00</option><option value="16">16:00</option><option value="17">17:00</option>
          </select>
        </div>
        <div class="form-group"><label>Lecture Hours</label><select id="slot_duration_selection" required><option value="1">1 Hour</option><option value="2">2 Hours</option></select></div>
        <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="close_all_interface_modals()">Cancel</button><button type="submit" class="btn">Save</button></div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="extra_class_modal">
    <div class="modal-box">
      <div class="modal-title">Add Extra Class</div>
      <form id="extra_class_input_form">
        <div class="form-group"><label>Subject</label><select id="extra_subject_selection" required></select></div>
        <div class="form-group"><label>Date</label><input type="date" id="extra_date_selection" required></div>
        <div class="form-group">
          <label>Start Time (24h)</label>
          <select id="extra_start_time_selection" required>
            <option value="8">08:00</option><option value="9">09:00</option><option value="10">10:00</option><option value="11">11:00</option><option value="12">12:00</option><option value="13">13:00</option><option value="14">14:00</option><option value="15">15:00</option><option value="16">16:00</option><option value="17">17:00</option>
          </select>
        </div>
        <div class="form-group"><label>Lecture Hours</label><select id="extra_duration_selection" required><option value="1">1 Hour</option><option value="2">2 Hours</option></select></div>
        <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="close_all_interface_modals()">Cancel</button><button type="submit" class="btn">Save</button></div>
      </form>
    </div>
  </div>

  <script type="module" src="script.js"></script>   
</body>
</html>
