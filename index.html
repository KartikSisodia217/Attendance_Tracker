<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ======================
       CSS VARIABLES & THEME
       ====================== */
    :root {
      --bg: #0f1117;
      --bg-sec: #1a1d26;
      --border: #2a2f3a;
      --text: #e6e6e6;
      --text-muted: #8b949e;
      --accent: #7c5cff;
      --accent-hover: #6a4ee0;
      --present: #2ecc71;
      --absent: #e74c3c;
      --cancelled: #f39c12;
      --font: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ======================
       LAYOUT
       ====================== */
    .app-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 320px;
      background-color: var(--bg-sec);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }

    /* ======================
       SIDEBAR & COMPONENTS
       ====================== */
    .brand {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 30px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 15px;
      margin-top: 20px;
    }

    .btn {
      background-color: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font);
      font-weight: 500;
      transition: background 0.2s;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: var(--bg);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background-color: var(--border);
    }

    .stats-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .subject-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .subject-code {
      font-size: 11px;
      color: var(--accent);
      background: rgba(124, 92, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .icon-btn:hover {
      opacity: 1;
    }

    .edit-btn {
      color: var(--text-muted);
    }

    .delete-btn {
      color: var(--absent);
    }

    .stat-card {
      background-color: var(--bg);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .stat-perc {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 8px;
    }

    /* ======================
       MAIN AREA (CALENDAR)
       ====================== */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .nav-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nav-controls h2 {
      font-size: 18px;
      font-weight: 600;
      min-width: 200px;
      text-align: center;
    }

    .nav-btn {
      background: var(--bg-sec);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: var(--border);
    }

    .calendar-container {
      flex: 1;
      background: var(--bg-sec);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: 60px repeat(5, 1fr);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-sec);
      z-index: 10;
    }

    .day-col-header {
      padding: 12px 6px;
      text-align: center;
      border-left: 1px solid var(--border);
      font-weight: 500;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .day-col-header span {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* TODAY HIGHLIGHT STYLES */
    .today-header {
      background: rgba(124, 92, 255, 0.1);
      border-top: 3px solid var(--accent);
      box-shadow: inset 0 10px 20px -10px rgba(124, 92, 255, 0.2);
    }

    .today-cell {
      background-color: rgba(124, 92, 255, 0.03);
    }

    .today-badge {
      background: var(--accent);
      color: #000;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
      box-shadow: 0 0 10px rgba(124, 92, 255, 0.5);
    }

    /* Mark Day Buttons */
    .mark-day-container {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .mark-day-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      white-space: nowrap;
    }

    .mark-p-btn {
      color: var(--present);
    }

    .mark-p-btn:hover {
      background: var(--present);
      color: #000;
      border-color: var(--present);
    }

    .mark-a-btn {
      color: var(--absent);
    }

    .mark-a-btn:hover {
      background: var(--absent);
      color: #fff;
      border-color: var(--absent);
    }

    .calendar-body {
      display: grid;
      grid-template-columns: 60px repeat(5, 1fr);
      grid-template-rows: repeat(10, 100px);
      /* 10 hours: 8 to 17 */
      position: relative;
    }

    .time-slot-label {
      grid-column: 1;
      border-bottom: 1px solid var(--border);
      text-align: right;
      padding: 8px;
      font-size: 11px;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
    }

    .grid-cell {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .lecture-card {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      margin: 4px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      z-index: 5;
      overflow: hidden;
      position: relative;
    }

    .lecture-info {
      font-size: 12px;
      display: flex;
      flex-direction: column;
    }

    .lecture-info strong {
      font-size: 13px;
    }

    .attendance-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: auto;
    }

    .attendance-row {
      display: flex;
      gap: 4px;
    }

    .att-btn {
      flex: 1;
      background: var(--bg-sec);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 0;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .att-btn.active-p {
      background: var(--present);
      color: #000;
      border-color: var(--present);
    }

    .att-btn.active-a {
      background: var(--absent);
      color: #fff;
      border-color: var(--absent);
    }

    .att-btn.active-c {
      background: var(--cancelled);
      color: #fff;
      border-color: var(--cancelled);
    }

    /* ======================
       MODALS
       ====================== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--bg-sec);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 12px;
      width: 400px;
      max-width: 90%;
    }

    .modal-title {
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    /* Color Picker Styles */
    .color-picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }

    .color-swatch.selected {
      border-color: #fff;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="app-container">

    <aside class="sidebar">
      <div class="brand">Attendance Tracker</div>

      <button class="btn" onclick="openAddSubject()">+ Add Subject</button>

      <div class="section-title">Attendance Overview</div>
      <div class="stats-list" id="statsList"></div>
    </aside>

    <main class="main-area">
      <div class="toolbar">
        <div class="nav-controls">
          <button class="nav-btn" onclick="changeWeek(-1)">◀ Prev</button>
          <button class="nav-btn" onclick="jumpToCurrentWeek()">Today</button>
          <button class="nav-btn" onclick="changeWeek(1)">Next ▶</button>
          <h2 id="currentWeekLabel">May 2026</h2>
        </div>
        <div style="display: flex; gap: 10px;">
          <button class="nav-btn" onclick="openModal('slotModal')">+ Add Weekly Slot</button>
          <button class="nav-btn" onclick="openModal('extraClassModal')">+ Add Extra Class</button>
        </div>
      </div>

      <div class="calendar-container">
        <div class="calendar-header" id="calendarHeader"></div>
        <div class="calendar-body" id="calendarBody"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="subjectModal">
    <div class="modal-box">
      <div class="modal-title" id="subjectModalTitle">Add Subject</div>
      <form id="subjectForm">
        <div class="form-group">
          <label>Subject Name</label>
          <input type="text" id="subName" required placeholder="e.g. Mathematics">
        </div>
        <div class="form-group">
          <label>Subject Code</label>
          <input type="text" id="subCode" required placeholder="e.g. MA101">
        </div>
        <div class="form-group">
          <label>Subject Color</label>
          <div class="color-picker" id="colorPicker"></div>
          <input type="hidden" id="subColor" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModals()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="slotModal">
    <div class="modal-box">
      <div class="modal-title">Add Weekly Slot</div>
      <form id="slotForm">
        <div class="form-group">
          <label>Subject</label>
          <select id="slotSubject" required></select>
        </div>
        <div class="form-group">
          <label>Day</label>
          <select id="slotDay" required>
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
          </select>
        </div>
        <div class="form-group">
          <label>Start Time (24h)</label>
          <select id="slotStart" required>
            <option value="8">08:00</option>
            <option value="9">09:00</option>
            <option value="10">10:00</option>
            <option value="11">11:00</option>
            <option value="12">12:00</option>
            <option value="13">13:00</option>
            <option value="14">14:00</option>
            <option value="15">15:00</option>
            <option value="16">16:00</option>
            <option value="17">17:00</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lecture Hours</label>
          <select id="slotDuration" required>
            <option value="1">1 Hour</option>
            <option value="2">2 Hours</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModals()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="extraClassModal">
    <div class="modal-box">
      <div class="modal-title">Add Extra Class</div>
      <form id="extraForm">
        <div class="form-group">
          <label>Subject</label>
          <select id="extraSubject" required></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="extraDate" required>
        </div>
        <div class="form-group">
          <label>Start Time (24h)</label>
          <select id="extraStart" required>
            <option value="8">08:00</option>
            <option value="9">09:00</option>
            <option value="10">10:00</option>
            <option value="11">11:00</option>
            <option value="12">12:00</option>
            <option value="13">13:00</option>
            <option value="14">14:00</option>
            <option value="15">15:00</option>
            <option value="16">16:00</option>
            <option value="17">17:00</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lecture Hours</label>
          <select id="extraDuration" required>
            <option value="1">1 Hour</option>
            <option value="2">2 Hours</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModals()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const state = {
      subjects: [],
      slots: [],
      extraClasses: [],
      attendance: [],
      currentWeekMonday: null
    };

    let editingSubjectId = null;

    const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    const COLORS = ['#7c5cff', '#3498db', '#2ecc71', '#f1c40f', '#e67e22', '#e74c3c', '#e84393', '#9b59b6', '#1abc9c', '#00cec9'];

    function loadData() {
      const s = localStorage.getItem('subjects');
      const sl = localStorage.getItem('slots');
      const ec = localStorage.getItem('extraClasses');
      const a = localStorage.getItem('attendance');

      if (s) state.subjects = JSON.parse(s);
      if (sl) state.slots = JSON.parse(sl);
      if (ec) state.extraClasses = JSON.parse(ec);
      if (a) state.attendance = JSON.parse(a);
    }

    function saveData() {
      localStorage.setItem('subjects', JSON.stringify(state.subjects));
      localStorage.setItem('slots', JSON.stringify(state.slots));
      localStorage.setItem('extraClasses', JSON.stringify(state.extraClasses));
      localStorage.setItem('attendance', JSON.stringify(state.attendance));
    }

    function getMonday(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function formatDate(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function generateId(prefix) {
      return `${prefix}_${Math.random().toString(36).substr(2, 9)}`;
    }

    function getSubjectById(id) {
      return state.subjects.find(s => s.id === id);
    }

    function render() {
      renderStats();
      renderCalendar();
      updateSelectDropdowns();
    }

    function renderStats() {
      const list = document.getElementById('statsList');
      list.innerHTML = '';

      state.subjects.forEach(sub => {
        let present = 0;
        let total = 0;
        let cancelled = 0;

        state.attendance.forEach(att => {
          if (att.subjectId === sub.id) {
            att.statuses.forEach(status => {
              if (status === 'P') { present++; total++; }
              else if (status === 'A') { total++; }
              else if (status === 'C') { cancelled++; }
            });
          }
        });

        const perc = total === 0 ? 0 : ((present / total) * 100).toFixed(1);

        let targetText = '';
        if (total === 0) {
          targetText = `<span style="color: var(--text-muted);">No classes yet</span>`;
        } else if (perc >= 75) {
          const skippable = Math.floor((4 * present - 3 * total) / 3);

          if (skippable > 0) {
            targetText = `<span style="color: var(--present); font-weight: 600;">✔ Safe (Can skip ${skippable} hrs)</span>`;
          } else {
            targetText = `<span style="color: var(--present); font-weight: 600;">✔ Safe (Cannot skip any)</span>`;
          }
        } else {
          const required = (3 * total) - (4 * present);
          targetText = `<span style="color: var(--cancelled); font-weight: 600;">⚠️ Need ${required} lecture hrs</span>`;
        }

        list.innerHTML += `
          <div class="stat-card" style="border-left: 4px solid ${sub.color || 'var(--accent)'}">
            
            <div class="subject-header" style="align-items: flex-start;">
              <div style="font-weight:600; color:var(--text); flex: 1; padding-right: 12px; word-break: break-word;">
                ${sub.name}
              </div>
              <div class="card-actions">
                <span class="subject-code" style="color: ${sub.color || 'var(--accent)'}; background: ${sub.color ? sub.color + '1A' : 'rgba(124, 92, 255, 0.1)'}; margin-left: 0; margin-right: 4px;">${sub.code}</span>
                <button class="icon-btn edit-btn" onclick="openEditSubject('${sub.id}')" title="Edit Subject">🖉</button>
                <button class="icon-btn delete-btn" onclick="deleteSubject('${sub.id}')" title="Delete Subject">✖</button>
              </div>
            </div>

            <div class="stat-row"><span>Present:</span> <span>${present}</span></div>
            <div class="stat-row"><span>Total:</span> <span>${total}</span></div>
            <div class="stat-row"><span>Cancelled:</span> <span>${cancelled}</span></div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px;">
              <div class="stat-perc" style="color: ${sub.color || 'var(--accent)'}; margin-top: 0;">${perc}%</div>
              <div style="font-size: 11px;">${targetText}</div>
            </div>

          </div>
        `;
      });
    }

    function renderCalendar() {
      const header = document.getElementById('calendarHeader');
      const body = document.getElementById('calendarBody');
      const actualTodayDateStr = formatDate(new Date());

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      document.getElementById('currentWeekLabel').innerText = `${monthNames[state.currentWeekMonday.getMonth()]} ${state.currentWeekMonday.getFullYear()}`;

      header.innerHTML = `<div class="day-col-header" style="justify-content: center;">Time</div>`;
      let currentDates = [];
      for (let i = 0; i < 5; i++) {
        let d = new Date(state.currentWeekMonday);
        d.setDate(d.getDate() + i);
        const dateStr = formatDate(d);
        currentDates.push(dateStr);

        // Check if this specific column is TODAY
        const isToday = (dateStr === actualTodayDateStr);
        const todayHeaderClass = isToday ? 'today-header' : '';
        const todayBadgeHTML = isToday ? `<div class="today-badge">TODAY</div>` : `<div class="today-badge" style="visibility: hidden;">TODAY</div>`;

        header.innerHTML += `
          <div class="day-col-header ${todayHeaderClass}">
            ${todayBadgeHTML}
            ${DAYS[i]}
            <span>${d.getDate()} ${monthNames[d.getMonth()].substr(0, 3)}</span>
            <div class="mark-day-container">
              <button class="mark-day-btn mark-p-btn" onclick="markDayBulk('${dateStr}', 'P')" title="Mark all classes Present">Present All Day</button>
              <button class="mark-day-btn mark-a-btn" onclick="markDayBulk('${dateStr}', 'A')" title="Mark all classes Absent">Absent All Day</button>
            </div>
          </div>
        `;
      }

      body.innerHTML = '';
      for (let hour = 8; hour <= 17; hour++) {
        body.innerHTML += `<div class="time-slot-label" style="grid-row: ${hour - 7}">${hour}:00</div>`;
        for (let day = 1; day <= 5; day++) {
          const dateStr = currentDates[day - 1];
          const isToday = (dateStr === actualTodayDateStr);
          const cellClass = isToday ? 'grid-cell today-cell' : 'grid-cell';
          body.innerHTML += `<div class="${cellClass}" style="grid-column: ${day + 1}; grid-row: ${hour - 7}"></div>`;
        }
      }

      const lecturesToRender = [];

      state.slots.forEach(slot => {
        const dayIndex = DAYS.indexOf(slot.day);
        const dateStr = currentDates[dayIndex];
        lecturesToRender.push({
          type: 'slot', id: slot.id, subjectId: slot.subjectId, date: dateStr,
          dayIndex: dayIndex, startTime: slot.startTime, lectureHours: slot.lectureHours
        });
      });

      state.extraClasses.forEach(ec => {
        const ecDate = new Date(ec.date);
        ecDate.setHours(0, 0, 0, 0);
        const diffDays = Math.round((ecDate - state.currentWeekMonday) / (1000 * 60 * 60 * 24));
        if (diffDays >= 0 && diffDays <= 4) {
          lecturesToRender.push({
            type: 'extra', id: ec.id, subjectId: ec.subjectId, date: ec.date,
            dayIndex: diffDays, startTime: ec.startTime, lectureHours: ec.lectureHours
          });
        }
      });

      lecturesToRender.forEach(lec => {
        const sub = getSubjectById(lec.subjectId);
        if (!sub) return;

        const attId = `att_${lec.subjectId}_${lec.date}_${lec.startTime}`;
        let attRecord = state.attendance.find(a => a.id === attId);
        let statuses = attRecord ? attRecord.statuses : new Array(lec.lectureHours).fill(null);

        const s = statuses[0];
        const pClass = s === 'P' ? 'active-p' : '';
        const aClass = s === 'A' ? 'active-a' : '';
        const cClass = s === 'C' ? 'active-c' : '';

        let attHTML = `
          <div class="attendance-controls">
            <div class="attendance-row">
              <button class="att-btn ${pClass}" onclick="markAttBulk('${attId}', '${lec.subjectId}', '${lec.date}', ${lec.startTime}, ${lec.lectureHours}, 'P')">[P]</button>
              <button class="att-btn ${aClass}" onclick="markAttBulk('${attId}', '${lec.subjectId}', '${lec.date}', ${lec.startTime}, ${lec.lectureHours}, 'A')">[A]</button>
              <button class="att-btn ${cClass}" onclick="markAttBulk('${attId}', '${lec.subjectId}', '${lec.date}', ${lec.startTime}, ${lec.lectureHours}, 'C')">[C]</button>
            </div>
          </div>`;

        const card = document.createElement('div');
        card.className = 'lecture-card';
        card.style.gridColumn = lec.dayIndex + 2;
        card.style.gridRow = `${lec.startTime - 7} / span ${lec.lectureHours}`;
        card.style.borderColor = sub.color || 'var(--accent)';

        card.innerHTML = `
          <div class="lecture-info">
            <strong style="color: ${sub.color || 'var(--accent)'}">${sub.code}</strong>
            <span>${sub.name}</span>
            <span style="font-size:10px; color:var(--text-muted); margin-top:2px;">
              ${lec.startTime}:00 - ${lec.startTime + lec.lectureHours}:00 
              ${lec.type === 'extra' ? '(Extra)' : ''}
            </span>
          </div>
          ${attHTML}
          <button class="icon-btn delete-btn" style="position:absolute; top:4px; right:4px;" onclick="deleteLecture('${lec.type}', '${lec.id}')">✖</button>
        `;

        body.appendChild(card);
      });
    }

    function scrollToCurrentTime() {
      const container = document.querySelector('.calendar-container');
      const hour = new Date().getHours();

      // If it's between 8 AM and 5 PM, scroll to that hour minus a little padding
      if (hour >= 8 && hour <= 17) {
        const targetScroll = (hour - 8) * 100 - 40;
        container.scrollTo({ top: Math.max(0, targetScroll), behavior: 'smooth' });
      }
    }

    function updateSelectDropdowns() {
      const slotSub = document.getElementById('slotSubject');
      const extraSub = document.getElementById('extraSubject');
      const opts = state.subjects.map(s => `<option value="${s.id}">${s.name} (${s.code})</option>`).join('');
      slotSub.innerHTML = opts;
      extraSub.innerHTML = opts;
    }

    function initColorPicker(selectedColor = COLORS[0]) {
      const container = document.getElementById('colorPicker');
      const input = document.getElementById('subColor');
      container.innerHTML = COLORS.map((c) =>
        `<div class="color-swatch ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor(this, '${c}')"></div>`
      ).join('');
      input.value = selectedColor;
    }

    window.selectColor = function (el, color) {
      document.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('subColor').value = color;
    };

    window.openAddSubject = function () {
      editingSubjectId = null;
      document.getElementById('subjectModalTitle').innerText = 'Add Subject';
      document.getElementById('subjectForm').reset();
      initColorPicker(COLORS[0]);
      openModal('subjectModal');
    };

    window.openEditSubject = function (id) {
      editingSubjectId = id;
      const sub = getSubjectById(id);
      document.getElementById('subjectModalTitle').innerText = 'Edit Subject';
      document.getElementById('subName').value = sub.name;
      document.getElementById('subCode').value = sub.code;
      initColorPicker(sub.color || COLORS[0]);
      openModal('subjectModal');
    };

    document.getElementById('subjectForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('subName').value.trim();
      const code = document.getElementById('subCode').value.trim();
      const color = document.getElementById('subColor').value;

      if (editingSubjectId) {
        if (state.subjects.find(s => s.code === code && s.id !== editingSubjectId)) {
          alert('Subject code must be unique!');
          return;
        }
        const sub = getSubjectById(editingSubjectId);
        sub.name = name;
        sub.code = code;
        sub.color = color;
      } else {
        if (state.subjects.find(s => s.code === code)) {
          alert('Subject code must be unique!');
          return;
        }
        state.subjects.push({ id: generateId('sub'), name, code, color });
      }

      saveData();
      render();
      closeModals();
    });

    window.deleteSubject = function (id) {
      if (!confirm('Delete subject? This will remove all associated slots, extra classes, and attendance.')) return;
      state.subjects = state.subjects.filter(s => s.id !== id);
      state.slots = state.slots.filter(s => s.subjectId !== id);
      state.extraClasses = state.extraClasses.filter(e => e.subjectId !== id);
      state.attendance = state.attendance.filter(a => a.subjectId !== id);
      saveData();
      render();
    };

    document.getElementById('slotForm').addEventListener('submit', (e) => {
      e.preventDefault();
      state.slots.push({
        id: generateId('slot'),
        subjectId: document.getElementById('slotSubject').value,
        day: document.getElementById('slotDay').value,
        startTime: parseInt(document.getElementById('slotStart').value),
        lectureHours: parseInt(document.getElementById('slotDuration').value)
      });
      saveData();
      render();
      closeModals();
    });

    document.getElementById('extraForm').addEventListener('submit', (e) => {
      e.preventDefault();
      state.extraClasses.push({
        id: generateId('extra'),
        subjectId: document.getElementById('extraSubject').value,
        date: document.getElementById('extraDate').value,
        startTime: parseInt(document.getElementById('extraStart').value),
        lectureHours: parseInt(document.getElementById('extraDuration').value)
      });
      saveData();
      render();
      closeModals();
    });

    window.deleteLecture = function (type, id) {
      if (!confirm('Delete this class? All associated attendance records will be removed.')) return;

      if (type === 'slot') {
        const slot = state.slots.find(s => s.id === id);
        if (slot) {
          state.attendance = state.attendance.filter(a => {
            if (a.subjectId === slot.subjectId && a.startTime === slot.startTime) {
              const d = new Date(a.date + 'T00:00:00');
              const dayName = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][d.getDay()];
              if (dayName === slot.day) return false;
            }
            return true;
          });
        }
        state.slots = state.slots.filter(s => s.id !== id);
      }

      if (type === 'extra') {
        const extra = state.extraClasses.find(e => e.id === id);
        if (extra) {
          state.attendance = state.attendance.filter(a =>
            !(a.subjectId === extra.subjectId && a.date === extra.date && a.startTime === extra.startTime)
          );
        }
        state.extraClasses = state.extraClasses.filter(e => e.id !== id);
      }

      saveData();
      render();
    };

    window.markAttBulk = function (attId, subjectId, date, startTime, totalHours, status) {
      let record = state.attendance.find(a => a.id === attId);

      if (!record) {
        record = {
          id: attId,
          subjectId: subjectId,
          date: date,
          startTime: startTime,
          statuses: new Array(totalHours).fill(null)
        };
        state.attendance.push(record);
      }

      if (record.statuses[0] === status) {
        record.statuses.fill(null);
      } else {
        record.statuses.fill(status);
      }

      saveData();
      render();
    };

    // Unified function to mark the entire day as P or A
    window.markDayBulk = function (dateStr, status) {
      const dayObj = new Date(dateStr + 'T00:00:00');
      const dayName = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][dayObj.getDay()];

      let lecturesOnDay = [];

      // Find slots for this day of the week
      state.slots.forEach(slot => {
        if (slot.day === dayName) {
          lecturesOnDay.push({ subjectId: slot.subjectId, startTime: slot.startTime, hours: slot.lectureHours });
        }
      });

      // Find extra classes specifically on this date
      state.extraClasses.forEach(ec => {
        if (ec.date === dateStr) {
          lecturesOnDay.push({ subjectId: ec.subjectId, startTime: ec.startTime, hours: ec.lectureHours });
        }
      });

      if (lecturesOnDay.length === 0) {
        alert("No classes scheduled for this day.");
        return;
      }

      // Automatically fill or create records with the chosen status
      lecturesOnDay.forEach(lec => {
        const attId = `att_${lec.subjectId}_${dateStr}_${lec.startTime}`;
        let record = state.attendance.find(a => a.id === attId);

        if (!record) {
          record = {
            id: attId,
            subjectId: lec.subjectId,
            date: dateStr,
            startTime: lec.startTime,
            statuses: new Array(lec.hours).fill(status)
          };
          state.attendance.push(record);
        } else {
          record.statuses.fill(status);
        }
      });

      saveData();
      render();
    };

    window.changeWeek = function (offset) {
      state.currentWeekMonday.setDate(state.currentWeekMonday.getDate() + (offset * 7));
      render();
    };

    window.jumpToCurrentWeek = function () {
      state.currentWeekMonday = getMonday(new Date());
      render();
      setTimeout(scrollToCurrentTime, 100); // Wait for render to finish before scrolling
    };

    window.openModal = function (id) {
      document.getElementById(id).classList.add('active');
    };

    window.closeModals = function () {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
    };

    window.onload = () => {
      loadData();
      state.currentWeekMonday = getMonday(new Date());
      initColorPicker();
      render();
      setTimeout(scrollToCurrentTime, 100); // Auto-scroll on initial load
    };

  </script>
</body>

</html>
