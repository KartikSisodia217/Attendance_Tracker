<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --bg-sec: #1a1d26;
      --border: #2a2f3a;
      --text: #e6e6e6;
      --text-muted: #8b949e;
      --accent: #7c5cff;
      --accent-hover: #6a4ee0;
      --present: #2ecc71;
      --absent: #e74c3c;
      --cancelled: #f39c12;
      --font: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 280px;
      background-color: var(--bg-sec);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 15px;
      overflow-y: auto;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 15px;
      overflow-y: auto;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 25px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 10px;
      margin-top: 15px;
    }

    .btn {
      background-color: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font);
      font-weight: 500;
      font-size: 13px;
      transition: background 0.2s;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: var(--bg);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background-color: var(--border);
    }

    .stats-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .subject-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .subject-code {
      font-size: 10px;
      color: var(--accent);
      background: rgba(124, 92, 255, 0.1);
      padding: 2px 4px;
      border-radius: 4px;
      font-weight: 500;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .icon-btn:hover {
      opacity: 1;
    }

    .edit-btn {
      color: var(--text-muted);
    }

    .delete-btn {
      color: var(--absent);
    }

    .stat-card {
      background-color: var(--bg);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .stat-perc {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 6px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .nav-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-controls h2 {
      font-size: 16px;
      font-weight: 600;
      min-width: 160px;
      text-align: center;
    }

    .nav-btn {
      background: var(--bg-sec);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: var(--border);
    }

    .calendar-container {
      flex: 1;
      background: var(--bg-sec);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: 50px repeat(5, 1fr);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-sec);
      z-index: 10;
    }

    .day-col-header {
      padding: 8px 4px;
      text-align: center;
      border-left: 1px solid var(--border);
      font-weight: 500;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .day-col-header span {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .today-header {
      background: rgba(124, 92, 255, 0.1);
      border-top: 3px solid var(--accent);
      box-shadow: inset 0 10px 20px -10px rgba(124, 92, 255, 0.2);
    }

    .today-cell {
      background-color: rgba(124, 92, 255, 0.03);
    }

    .today-badge {
      background: var(--accent);
      color: #000;
      font-size: 8px;
      padding: 2px 6px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
      box-shadow: 0 0 10px rgba(124, 92, 255, 0.5);
    }

    .mark-day-container {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      width: 100%;
      justify-content: center;
    }

    .mark-day-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 9px;
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      white-space: nowrap;
    }

    .mark-p-btn {
      color: var(--present);
    }

    .mark-p-btn:hover {
      background: var(--present);
      color: #000;
      border-color: var(--present);
    }

    .mark-a-btn {
      color: var(--absent);
    }

    .mark-a-btn:hover {
      background: var(--absent);
      color: #fff;
      border-color: var(--absent);
    }

    .calendar-body {
      display: grid;
      grid-template-columns: 50px repeat(5, 1fr);
      grid-template-rows: repeat(10, 80px);
      position: relative;
    }

    .time-slot-label {
      grid-column: 1;
      border-bottom: 1px solid var(--border);
      text-align: right;
      padding: 6px;
      font-size: 10px;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
    }

    .grid-cell {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .lecture-card {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      margin: 3px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      z-index: 5;
      overflow: hidden;
      position: relative;
    }

    .lecture-info {
      font-size: 11px;
      display: flex;
      flex-direction: column;
    }

    .lecture-info strong {
      font-size: 12px;
    }

    .attendance-controls {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-top: auto;
    }

    .attendance-row {
      display: flex;
      gap: 3px;
    }

    .att-btn {
      flex: 1;
      background: var(--bg-sec);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 10px;
      padding: 3px 0;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .att-btn.active-p {
      background: var(--present);
      color: #000;
      border-color: var(--present);
    }

    .att-btn.active-a {
      background: var(--absent);
      color: #fff;
      border-color: var(--absent);
    }

    .att-btn.active-c {
      background: var(--cancelled);
      color: #fff;
      border-color: var(--cancelled);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--bg-sec);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 12px;
      width: 360px;
      max-width: 90%;
    }

    .modal-title {
      font-size: 16px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .color-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }

    .color-swatch.selected {
      border-color: #fff;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="app-container">

    <aside class="sidebar">
      <div class="brand">Attendance Tracker</div>

      <button class="btn" onclick="open_add_subject_modal()">+ Add Subject</button>

      <div class="section-title">Attendance Overview</div>
      <div class="stats-list" id="stats_list_container"></div>
    </aside>

    <main class="main-area">
      <div class="toolbar">
        <div class="nav-controls">
          <button class="nav-btn" onclick="navigate_calendar_weeks(-1)">◀ Prev</button>
          <button class="nav-btn" onclick="navigate_to_current_week()">Today</button>
          <button class="nav-btn" onclick="navigate_calendar_weeks(1)">Next ▶</button>
          <h2 id="current_week_display_label">May 2026</h2>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="nav-btn" onclick="open_interface_modal('weekly_slot_modal')">+ Add Weekly Slot</button>
          <button class="nav-btn" onclick="open_interface_modal('extra_class_modal')">+ Add Extra Class</button>
        </div>
      </div>

      <div class="calendar-container">
        <div class="calendar-header" id="calendar_header_container"></div>
        <div class="calendar-body" id="calendar_body_container"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="subject_creation_modal">
    <div class="modal-box">
      <div class="modal-title" id="subject_modal_title_text">Add Subject</div>
      <form id="subject_input_form">
        <div class="form-group">
          <label>Subject Name</label>
          <input type="text" id="subject_name_input" required placeholder="e.g. Mathematics">
        </div>
        <div class="form-group">
          <label>Subject Code</label>
          <input type="text" id="subject_code_input" required placeholder="e.g. MA101">
        </div>
        <div class="form-group">
          <label>Subject Color</label>
          <div class="color-picker" id="color_selection_container"></div>
          <input type="hidden" id="subject_color_input" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="close_all_interface_modals()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="weekly_slot_modal">
    <div class="modal-box">
      <div class="modal-title">Add Weekly Slot</div>
      <form id="weekly_slot_form">
        <div class="form-group">
          <label>Subject</label>
          <select id="slot_subject_selection" required></select>
        </div>
        <div class="form-group">
          <label>Day</label>
          <select id="slot_day_selection" required>
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
          </select>
        </div>
        <div class="form-group">
          <label>Start Time (24h)</label>
          <select id="slot_start_time_selection" required>
            <option value="8">08:00</option>
            <option value="9">09:00</option>
            <option value="10">10:00</option>
            <option value="11">11:00</option>
            <option value="12">12:00</option>
            <option value="13">13:00</option>
            <option value="14">14:00</option>
            <option value="15">15:00</option>
            <option value="16">16:00</option>
            <option value="17">17:00</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lecture Hours</label>
          <select id="slot_duration_selection" required>
            <option value="1">1 Hour</option>
            <option value="2">2 Hours</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="close_all_interface_modals()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="extra_class_modal">
    <div class="modal-box">
      <div class="modal-title">Add Extra Class</div>
      <form id="extra_class_input_form">
        <div class="form-group">
          <label>Subject</label>
          <select id="extra_subject_selection" required></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="extra_date_selection" required>
        </div>
        <div class="form-group">
          <label>Start Time (24h)</label>
          <select id="extra_start_time_selection" required>
            <option value="8">08:00</option>
            <option value="9">09:00</option>
            <option value="10">10:00</option>
            <option value="11">11:00</option>
            <option value="12">12:00</option>
            <option value="13">13:00</option>
            <option value="14">14:00</option>
            <option value="15">15:00</option>
            <option value="16">16:00</option>
            <option value="17">17:00</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lecture Hours</label>
          <select id="extra_duration_selection" required>
            <option value="1">1 Hour</option>
            <option value="2">2 Hours</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="close_all_interface_modals()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const application_state = {
      enrolled_subjects: [],
      weekly_schedule_slots: [],
      additional_extra_classes: [],
      attendance_records: [],
      start_of_current_week: null
    };

    let currently_editing_subject_identifier = null;

    const WEEK_DAYS_ARRAY = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    const THEME_COLORS_ARRAY = ['#7c5cff', '#3498db', '#2ecc71', '#f1c40f', '#e67e22', '#e74c3c', '#e84393', '#9b59b6', '#1abc9c', '#00cec9'];

    function load_saved_application_data() {
      const saved_subjects_string = localStorage.getItem('enrolled_subjects_data');
      const saved_slots_string = localStorage.getItem('weekly_schedule_slots_data');
      const saved_extra_classes_string = localStorage.getItem('additional_extra_classes_data');
      const saved_attendance_string = localStorage.getItem('attendance_records_data');

      if (saved_subjects_string) application_state.enrolled_subjects = JSON.parse(saved_subjects_string);
      if (saved_slots_string) application_state.weekly_schedule_slots = JSON.parse(saved_slots_string);
      if (saved_extra_classes_string) application_state.additional_extra_classes = JSON.parse(saved_extra_classes_string);
      if (saved_attendance_string) application_state.attendance_records = JSON.parse(saved_attendance_string);
    }

    function save_current_application_data() {
      localStorage.setItem('enrolled_subjects_data', JSON.stringify(application_state.enrolled_subjects));
      localStorage.setItem('weekly_schedule_slots_data', JSON.stringify(application_state.weekly_schedule_slots));
      localStorage.setItem('additional_extra_classes_data', JSON.stringify(application_state.additional_extra_classes));
      localStorage.setItem('attendance_records_data', JSON.stringify(application_state.attendance_records));
    }

    function calculate_monday_of_target_week(target_date_object) {
      const copied_date_object = new Date(target_date_object);
      const day_of_week_index = copied_date_object.getDay();
      const date_difference_value = copied_date_object.getDate() - day_of_week_index + (day_of_week_index === 0 ? -6 : 1);
      copied_date_object.setDate(date_difference_value);
      copied_date_object.setHours(0, 0, 0, 0);
      return copied_date_object;
    }

    function format_date_to_string_format(date_object_to_format) {
      const year_numerical_value = date_object_to_format.getFullYear();
      const month_numerical_value = String(date_object_to_format.getMonth() + 1).padStart(2, '0');
      const day_numerical_value = String(date_object_to_format.getDate()).padStart(2, '0');
      return `${year_numerical_value}-${month_numerical_value}-${day_numerical_value}`;
    }

    function generate_unique_random_identifier(identifier_prefix_string) {
      return `${identifier_prefix_string}_${Math.random().toString(36).substr(2, 9)}`;
    }

    function retrieve_subject_object_by_identifier(target_subject_identifier) {
      return application_state.enrolled_subjects.find(subject_item => subject_item.subject_identifier === target_subject_identifier);
    }

    function render_entire_application_interface() {
      render_attendance_statistics_cards();
      render_weekly_calendar_grid();
      update_dropdown_selection_options();
    }

    function render_attendance_statistics_cards() {
      const statistics_list_container = document.getElementById('stats_list_container');
      statistics_list_container.innerHTML = '';

      application_state.enrolled_subjects.forEach(current_subject_data => {
        let total_present_hours_count = 0;
        let total_scheduled_hours_count = 0;
        let total_cancelled_hours_count = 0;

        application_state.attendance_records.forEach(attendance_record_item => {
          if (attendance_record_item.parent_subject_identifier === current_subject_data.subject_identifier) {
            attendance_record_item.lecture_status_array.forEach(attendance_status_value => {
              if (attendance_status_value === 'P') { total_present_hours_count++; total_scheduled_hours_count++; }
              else if (attendance_status_value === 'A') { total_scheduled_hours_count++; }
              else if (attendance_status_value === 'C') { total_cancelled_hours_count++; }
            });
          }
        });

        const calculated_attendance_percentage = total_scheduled_hours_count === 0 ? 0 : ((total_present_hours_count / total_scheduled_hours_count) * 100).toFixed(1);

        let dynamic_target_text_output = '';
        if (total_scheduled_hours_count === 0) {
          dynamic_target_text_output = `<span style="color: var(--text-muted);">No classes yet</span>`;
        } else if (calculated_attendance_percentage >= 75) {
          const skippable_lecture_hours_count = Math.floor((4 * total_present_hours_count - 3 * total_scheduled_hours_count) / 3);

          if (skippable_lecture_hours_count > 0) {
            dynamic_target_text_output = `<span style="color: var(--present); font-weight: 600;">✔ Safe (Can skip ${skippable_lecture_hours_count} hrs)</span>`;
          } else {
            dynamic_target_text_output = `<span style="color: var(--present); font-weight: 600;">✔ Safe (Cannot skip any)</span>`;
          }
        } else {
          const required_lecture_hours_count = (3 * total_scheduled_hours_count) - (4 * total_present_hours_count);
          dynamic_target_text_output = `<span style="color: var(--cancelled); font-weight: 600;">⚠️ Need ${required_lecture_hours_count} lecture hrs</span>`;
        }

        statistics_list_container.innerHTML += `
          <div class="stat-card" style="border-left: 4px solid ${current_subject_data.subject_color_hex || 'var(--accent)'}">
            
            <div class="subject-header" style="align-items: flex-start;">
              <div style="font-weight:600; color:var(--text); flex: 1; padding-right: 12px; word-break: break-word;">
                ${current_subject_data.subject_name_text}
              </div>
              <div class="card-actions">
                <span class="subject-code" style="color: ${current_subject_data.subject_color_hex || 'var(--accent)'}; background: ${current_subject_data.subject_color_hex ? current_subject_data.subject_color_hex + '1A' : 'rgba(124, 92, 255, 0.1)'}; margin-left: 0; margin-right: 4px;">${current_subject_data.subject_code_text}</span>
                <button class="icon-btn edit-btn" onclick="open_edit_subject_modal('${current_subject_data.subject_identifier}')" title="Edit Subject">🖉</button>
                <button class="icon-btn delete-btn" onclick="delete_selected_subject_data('${current_subject_data.subject_identifier}')" title="Delete Subject">✖</button>
              </div>
            </div>

            <div class="stat-row"><span>Present:</span> <span>${total_present_hours_count}</span></div>
            <div class="stat-row"><span>Total:</span> <span>${total_scheduled_hours_count}</span></div>
            <div class="stat-row"><span>Cancelled:</span> <span>${total_cancelled_hours_count}</span></div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px;">
              <div class="stat-perc" style="color: ${current_subject_data.subject_color_hex || 'var(--accent)'}; margin-top: 0;">${calculated_attendance_percentage}%</div>
              <div style="font-size: 10px;">${dynamic_target_text_output}</div>
            </div>

          </div>
        `;
      });
    }

    function render_weekly_calendar_grid() {
      const calendar_header_container_element = document.getElementById('calendar_header_container');
      const calendar_body_container_element = document.getElementById('calendar_body_container');
      const actual_current_date_string = format_date_to_string_format(new Date());

      const month_names_array = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      document.getElementById('current_week_display_label').innerText = `${month_names_array[application_state.start_of_current_week.getMonth()]} ${application_state.start_of_current_week.getFullYear()}`;

      calendar_header_container_element.innerHTML = `<div class="day-col-header" style="justify-content: center;">Time</div>`;
      let current_week_dates_array = [];
      for (let iteration_index = 0; iteration_index < 5; iteration_index++) {
        let calculated_date_object = new Date(application_state.start_of_current_week);
        calculated_date_object.setDate(calculated_date_object.getDate() + iteration_index);
        const formatted_date_string_value = format_date_to_string_format(calculated_date_object);
        current_week_dates_array.push(formatted_date_string_value);

        const is_current_day_boolean = (formatted_date_string_value === actual_current_date_string);
        const dynamic_today_header_class = is_current_day_boolean ? 'today-header' : '';
        const dynamic_today_badge_html = is_current_day_boolean ? `<div class="today-badge">TODAY</div>` : `<div class="today-badge" style="visibility: hidden;">TODAY</div>`;

        calendar_header_container_element.innerHTML += `
          <div class="day-col-header ${dynamic_today_header_class}">
            ${dynamic_today_badge_html}
            ${WEEK_DAYS_ARRAY[iteration_index]}
            <span>${calculated_date_object.getDate()} ${month_names_array[calculated_date_object.getMonth()].substr(0, 3)}</span>
            <div class="mark-day-container">
              <button class="mark-day-btn mark-p-btn" onclick="mark_full_day_attendance_bulk('${formatted_date_string_value}', 'P')" title="Mark all classes Present">All Present</button>
              <button class="mark-day-btn mark-a-btn" onclick="mark_full_day_attendance_bulk('${formatted_date_string_value}', 'A')" title="Mark all classes Absent">All Absent</button>
            </div>
          </div>
        `;
      }

      calendar_body_container_element.innerHTML = '';
      for (let hour_iteration_index = 8; hour_iteration_index <= 17; hour_iteration_index++) {
        calendar_body_container_element.innerHTML += `<div class="time-slot-label" style="grid-row: ${hour_iteration_index - 7}">${hour_iteration_index}:00</div>`;
        for (let day_iteration_index = 1; day_iteration_index <= 5; day_iteration_index++) {
          const corresponding_date_string = current_week_dates_array[day_iteration_index - 1];
          const is_current_day_boolean_cell = (corresponding_date_string === actual_current_date_string);
          const dynamic_cell_class_name = is_current_day_boolean_cell ? 'grid-cell today-cell' : 'grid-cell';
          calendar_body_container_element.innerHTML += `<div class="${dynamic_cell_class_name}" style="grid-column: ${day_iteration_index + 1}; grid-row: ${hour_iteration_index - 7}"></div>`;
        }
      }

      const unified_lectures_array_to_render = [];

      application_state.weekly_schedule_slots.forEach(schedule_slot_item => {
        const corresponding_day_index_value = WEEK_DAYS_ARRAY.indexOf(schedule_slot_item.day_of_week_name);
        const corresponding_date_string_value = current_week_dates_array[corresponding_day_index_value];
        unified_lectures_array_to_render.push({
          lecture_type_string: 'slot', lecture_identifier: schedule_slot_item.slot_identifier, parent_subject_identifier: schedule_slot_item.parent_subject_identifier, lecture_date_string: corresponding_date_string_value,
          lecture_day_index: corresponding_day_index_value, lecture_start_hour: schedule_slot_item.start_time_hour_value, lecture_duration_hours: schedule_slot_item.lecture_duration_value
        });
      });

      application_state.additional_extra_classes.forEach(extra_class_item => {
        const parsed_extra_class_date = new Date(extra_class_item.lecture_date_string);
        parsed_extra_class_date.setHours(0, 0, 0, 0);
        const calculated_difference_in_days = Math.round((parsed_extra_class_date - application_state.start_of_current_week) / (1000 * 60 * 60 * 24));
        if (calculated_difference_in_days >= 0 && calculated_difference_in_days <= 4) {
          unified_lectures_array_to_render.push({
            lecture_type_string: 'extra', lecture_identifier: extra_class_item.extra_class_identifier, parent_subject_identifier: extra_class_item.parent_subject_identifier, lecture_date_string: extra_class_item.lecture_date_string,
            lecture_day_index: calculated_difference_in_days, lecture_start_hour: extra_class_item.start_time_hour_value, lecture_duration_hours: extra_class_item.lecture_duration_value
          });
        }
      });

      unified_lectures_array_to_render.forEach(lecture_data_object => {
        const parent_subject_data_object = retrieve_subject_object_by_identifier(lecture_data_object.parent_subject_identifier);
        if (!parent_subject_data_object) return;

        const generated_attendance_identifier = `att_${lecture_data_object.parent_subject_identifier}_${lecture_data_object.lecture_date_string}_${lecture_data_object.lecture_start_hour}`;
        let retrieved_attendance_record = application_state.attendance_records.find(attendance_item => attendance_item.attendance_identifier === generated_attendance_identifier);
        let active_statuses_array = retrieved_attendance_record ? retrieved_attendance_record.lecture_status_array : new Array(lecture_data_object.lecture_duration_hours).fill(null);

        const primary_status_value = active_statuses_array[0];
        const dynamic_present_class = primary_status_value === 'P' ? 'active-p' : '';
        const dynamic_absent_class = primary_status_value === 'A' ? 'active-a' : '';
        const dynamic_cancelled_class = primary_status_value === 'C' ? 'active-c' : '';

        let generated_attendance_html_string = `
          <div class="attendance-controls">
            <div class="attendance-row">
              <button class="att-btn ${dynamic_present_class}" onclick="mark_specific_lecture_attendance_bulk('${generated_attendance_identifier}', '${lecture_data_object.parent_subject_identifier}', '${lecture_data_object.lecture_date_string}', ${lecture_data_object.lecture_start_hour}, ${lecture_data_object.lecture_duration_hours}, 'P')">[P]</button>
              <button class="att-btn ${dynamic_absent_class}" onclick="mark_specific_lecture_attendance_bulk('${generated_attendance_identifier}', '${lecture_data_object.parent_subject_identifier}', '${lecture_data_object.lecture_date_string}', ${lecture_data_object.lecture_start_hour}, ${lecture_data_object.lecture_duration_hours}, 'A')">[A]</button>
              <button class="att-btn ${dynamic_cancelled_class}" onclick="mark_specific_lecture_attendance_bulk('${generated_attendance_identifier}', '${lecture_data_object.parent_subject_identifier}', '${lecture_data_object.lecture_date_string}', ${lecture_data_object.lecture_start_hour}, ${lecture_data_object.lecture_duration_hours}, 'C')">[C]</button>
            </div>
          </div>`;

        const constructed_lecture_card_element = document.createElement('div');
        constructed_lecture_card_element.className = 'lecture-card';
        constructed_lecture_card_element.style.gridColumn = lecture_data_object.lecture_day_index + 2;
        constructed_lecture_card_element.style.gridRow = `${lecture_data_object.lecture_start_hour - 7} / span ${lecture_data_object.lecture_duration_hours}`;
        constructed_lecture_card_element.style.borderColor = parent_subject_data_object.subject_color_hex || 'var(--accent)';

        constructed_lecture_card_element.innerHTML = `
          <div class="lecture-info">
            <strong style="color: ${parent_subject_data_object.subject_color_hex || 'var(--accent)'}">${parent_subject_data_object.subject_code_text}</strong>
            <span>${parent_subject_data_object.subject_name_text}</span>
            <span style="font-size:9px; color:var(--text-muted); margin-top:2px;">
              ${lecture_data_object.lecture_start_hour}:00 - ${lecture_data_object.lecture_start_hour + lecture_data_object.lecture_duration_hours}:00 
              ${lecture_data_object.lecture_type_string === 'extra' ? '(Extra)' : ''}
            </span>
          </div>
          ${generated_attendance_html_string}
          <button class="icon-btn delete-btn" style="position:absolute; top:4px; right:4px;" onclick="delete_scheduled_lecture_instance('${lecture_data_object.lecture_type_string}', '${lecture_data_object.lecture_identifier}')">✖</button>
        `;

        calendar_body_container_element.appendChild(constructed_lecture_card_element);
      });
    }

    function scroll_interface_to_current_time_slot() {
      const scrolling_container_element = document.querySelector('.calendar-container');
      const current_system_hour_value = new Date().getHours();

      if (current_system_hour_value >= 8 && current_system_hour_value <= 17) {
        const calculated_target_scroll_position = (current_system_hour_value - 8) * 80 - 30;
        scrolling_container_element.scrollTo({ top: Math.max(0, calculated_target_scroll_position), behavior: 'smooth' });
      }
    }

    function update_dropdown_selection_options() {
      const slot_subject_dropdown_element = document.getElementById('slot_subject_selection');
      const extra_subject_dropdown_element = document.getElementById('extra_subject_selection');
      const generated_options_html_string = application_state.enrolled_subjects.map(subject_item => `<option value="${subject_item.subject_identifier}">${subject_item.subject_name_text} (${subject_item.subject_code_text})</option>`).join('');
      slot_subject_dropdown_element.innerHTML = generated_options_html_string;
      extra_subject_dropdown_element.innerHTML = generated_options_html_string;
    }

    function initialize_color_selection_palette(selected_color_hex_value = THEME_COLORS_ARRAY[0]) {
      const color_picker_container_element = document.getElementById('color_selection_container');
      const subject_color_hidden_input_element = document.getElementById('subject_color_input');
      color_picker_container_element.innerHTML = THEME_COLORS_ARRAY.map((color_hex_code) =>
        `<div class="color-swatch ${color_hex_code === selected_color_hex_value ? 'selected' : ''}" style="background:${color_hex_code}" onclick="select_subject_color_swatch(this, '${color_hex_code}')"></div>`
      ).join('');
      subject_color_hidden_input_element.value = selected_color_hex_value;
    }

    window.select_subject_color_swatch = function (clicked_element, color_hex_code_value) {
      document.querySelectorAll('.color-swatch').forEach(swatch_element => swatch_element.classList.remove('selected'));
      clicked_element.classList.add('selected');
      document.getElementById('subject_color_input').value = color_hex_code_value;
    };

    window.open_add_subject_modal = function () {
      currently_editing_subject_identifier = null;
      document.getElementById('subject_modal_title_text').innerText = 'Add Subject';
      document.getElementById('subject_input_form').reset();
      initialize_color_selection_palette(THEME_COLORS_ARRAY[0]);
      open_interface_modal('subject_creation_modal');
    };

    window.open_edit_subject_modal = function (target_subject_identifier) {
      currently_editing_subject_identifier = target_subject_identifier;
      const retrieved_subject_data = retrieve_subject_object_by_identifier(target_subject_identifier);
      document.getElementById('subject_modal_title_text').innerText = 'Edit Subject';
      document.getElementById('subject_name_input').value = retrieved_subject_data.subject_name_text;
      document.getElementById('subject_code_input').value = retrieved_subject_data.subject_code_text;
      initialize_color_selection_palette(retrieved_subject_data.subject_color_hex || THEME_COLORS_ARRAY[0]);
      open_interface_modal('subject_creation_modal');
    };

    document.getElementById('subject_input_form').addEventListener('submit', (form_submit_event) => {
      form_submit_event.preventDefault();
      const entered_subject_name_value = document.getElementById('subject_name_input').value.trim();
      const entered_subject_code_value = document.getElementById('subject_code_input').value.trim();
      const selected_subject_color_value = document.getElementById('subject_color_input').value;

      if (currently_editing_subject_identifier) {
        if (application_state.enrolled_subjects.find(subject_item => subject_item.subject_code_text === entered_subject_code_value && subject_item.subject_identifier !== currently_editing_subject_identifier)) {
          alert('Subject code must be unique!');
          return;
        }
        const subject_to_update = retrieve_subject_object_by_identifier(currently_editing_subject_identifier);
        subject_to_update.subject_name_text = entered_subject_name_value;
        subject_to_update.subject_code_text = entered_subject_code_value;
        subject_to_update.subject_color_hex = selected_subject_color_value;
      } else {
        if (application_state.enrolled_subjects.find(subject_item => subject_item.subject_code_text === entered_subject_code_value)) {
          alert('Subject code must be unique!');
          return;
        }
        application_state.enrolled_subjects.push({ subject_identifier: generate_unique_random_identifier('sub'), subject_name_text: entered_subject_name_value, subject_code_text: entered_subject_code_value, subject_color_hex: selected_subject_color_value });
      }

      save_current_application_data();
      render_entire_application_interface();
      close_all_interface_modals();
    });

    window.delete_selected_subject_data = function (target_subject_identifier) {
      if (!confirm('Delete subject? This will remove all associated slots, extra classes, and attendance.')) return;
      application_state.enrolled_subjects = application_state.enrolled_subjects.filter(subject_item => subject_item.subject_identifier !== target_subject_identifier);
      application_state.weekly_schedule_slots = application_state.weekly_schedule_slots.filter(slot_item => slot_item.parent_subject_identifier !== target_subject_identifier);
      application_state.additional_extra_classes = application_state.additional_extra_classes.filter(extra_class_item => extra_class_item.parent_subject_identifier !== target_subject_identifier);
      application_state.attendance_records = application_state.attendance_records.filter(attendance_item => attendance_item.parent_subject_identifier !== target_subject_identifier);
      save_current_application_data();
      render_entire_application_interface();
    };

    document.getElementById('weekly_slot_form').addEventListener('submit', (form_submit_event) => {
      form_submit_event.preventDefault();
      application_state.weekly_schedule_slots.push({
        slot_identifier: generate_unique_random_identifier('slot'),
        parent_subject_identifier: document.getElementById('slot_subject_selection').value,
        day_of_week_name: document.getElementById('slot_day_selection').value,
        start_time_hour_value: parseInt(document.getElementById('slot_start_time_selection').value),
        lecture_duration_value: parseInt(document.getElementById('slot_duration_selection').value)
      });
      save_current_application_data();
      render_entire_application_interface();
      close_all_interface_modals();
    });

    document.getElementById('extra_class_input_form').addEventListener('submit', (form_submit_event) => {
      form_submit_event.preventDefault();
      application_state.additional_extra_classes.push({
        extra_class_identifier: generate_unique_random_identifier('extra'),
        parent_subject_identifier: document.getElementById('extra_subject_selection').value,
        lecture_date_string: document.getElementById('extra_date_selection').value,
        start_time_hour_value: parseInt(document.getElementById('extra_start_time_selection').value),
        lecture_duration_value: parseInt(document.getElementById('extra_duration_selection').value)
      });
      save_current_application_data();
      render_entire_application_interface();
      close_all_interface_modals();
    });

    window.delete_scheduled_lecture_instance = function (lecture_type_string_value, target_lecture_identifier) {
      if (!confirm('Delete this class? All associated attendance records will be removed.')) return;

      if (lecture_type_string_value === 'slot') {
        const located_slot_record = application_state.weekly_schedule_slots.find(slot_item => slot_item.slot_identifier === target_lecture_identifier);
        if (located_slot_record) {
          application_state.attendance_records = application_state.attendance_records.filter(attendance_item => {
            if (attendance_item.parent_subject_identifier === located_slot_record.parent_subject_identifier && attendance_item.lecture_start_hour === located_slot_record.start_time_hour_value) {
              const parsed_attendance_date = new Date(attendance_item.lecture_date_string + 'T00:00:00');
              const derived_day_name_string = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][parsed_attendance_date.getDay()];
              if (derived_day_name_string === located_slot_record.day_of_week_name) return false;
            }
            return true;
          });
        }
        application_state.weekly_schedule_slots = application_state.weekly_schedule_slots.filter(slot_item => slot_item.slot_identifier !== target_lecture_identifier);
      }

      if (lecture_type_string_value === 'extra') {
        const located_extra_class_record = application_state.additional_extra_classes.find(extra_class_item => extra_class_item.extra_class_identifier === target_lecture_identifier);
        if (located_extra_class_record) {
          application_state.attendance_records = application_state.attendance_records.filter(attendance_item =>
            !(attendance_item.parent_subject_identifier === located_extra_class_record.parent_subject_identifier && attendance_item.lecture_date_string === located_extra_class_record.lecture_date_string && attendance_item.lecture_start_hour === located_extra_class_record.start_time_hour_value)
          );
        }
        application_state.additional_extra_classes = application_state.additional_extra_classes.filter(extra_class_item => extra_class_item.extra_class_identifier !== target_lecture_identifier);
      }

      save_current_application_data();
      render_entire_application_interface();
    };

    window.mark_specific_lecture_attendance_bulk = function (target_attendance_identifier, target_subject_identifier, target_date_string, target_start_hour, target_total_hours_duration, applied_status_value) {
      let located_attendance_record = application_state.attendance_records.find(attendance_item => attendance_item.attendance_identifier === target_attendance_identifier);

      if (!located_attendance_record) {
        located_attendance_record = {
          attendance_identifier: target_attendance_identifier,
          parent_subject_identifier: target_subject_identifier,
          lecture_date_string: target_date_string,
          lecture_start_hour: target_start_hour,
          lecture_status_array: new Array(target_total_hours_duration).fill(null)
        };
        application_state.attendance_records.push(located_attendance_record);
      }

      if (located_attendance_record.lecture_status_array[0] === applied_status_value) {
        located_attendance_record.lecture_status_array.fill(null);
      } else {
        located_attendance_record.lecture_status_array.fill(applied_status_value);
      }

      save_current_application_data();
      render_entire_application_interface();
    };

    window.mark_full_day_attendance_bulk = function (target_date_string, applied_status_value) {
      const parsed_target_date_object = new Date(target_date_string + 'T00:00:00');
      const derived_day_name_string = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][parsed_target_date_object.getDay()];

      let compiled_lectures_for_day_array = [];

      application_state.weekly_schedule_slots.forEach(slot_item => {
        if (slot_item.day_of_week_name === derived_day_name_string) {
          compiled_lectures_for_day_array.push({ parent_subject_identifier: slot_item.parent_subject_identifier, start_time_hour_value: slot_item.start_time_hour_value, lecture_duration_value: slot_item.lecture_duration_value });
        }
      });

      application_state.additional_extra_classes.forEach(extra_class_item => {
        if (extra_class_item.lecture_date_string === target_date_string) {
          compiled_lectures_for_day_array.push({ parent_subject_identifier: extra_class_item.parent_subject_identifier, start_time_hour_value: extra_class_item.start_time_hour_value, lecture_duration_value: extra_class_item.lecture_duration_value });
        }
      });

      if (compiled_lectures_for_day_array.length === 0) {
        alert("No classes scheduled for this day.");
        return;
      }

      compiled_lectures_for_day_array.forEach(lecture_data_object => {
        const generated_attendance_identifier = `att_${lecture_data_object.parent_subject_identifier}_${target_date_string}_${lecture_data_object.start_time_hour_value}`;
        let located_attendance_record = application_state.attendance_records.find(attendance_item => attendance_item.attendance_identifier === generated_attendance_identifier);

        if (!located_attendance_record) {
          located_attendance_record = {
            attendance_identifier: generated_attendance_identifier,
            parent_subject_identifier: lecture_data_object.parent_subject_identifier,
            lecture_date_string: target_date_string,
            lecture_start_hour: lecture_data_object.start_time_hour_value,
            lecture_status_array: new Array(lecture_data_object.lecture_duration_value).fill(applied_status_value)
          };
          application_state.attendance_records.push(located_attendance_record);
        } else {
          located_attendance_record.lecture_status_array.fill(applied_status_value);
        }
      });

      save_current_application_data();
      render_entire_application_interface();
    };

    window.navigate_calendar_weeks = function (week_offset_integer_value) {
      application_state.start_of_current_week.setDate(application_state.start_of_current_week.getDate() + (week_offset_integer_value * 7));
      render_entire_application_interface();
    };

    window.navigate_to_current_week = function () {
      application_state.start_of_current_week = calculate_monday_of_target_week(new Date());
      render_entire_application_interface();
      setTimeout(scroll_interface_to_current_time_slot, 100);
    };

    window.open_interface_modal = function (target_modal_identifier_string) {
      document.getElementById(target_modal_identifier_string).classList.add('active');
    };

    window.close_all_interface_modals = function () {
      document.querySelectorAll('.modal-overlay').forEach(modal_overlay_element => modal_overlay_element.classList.remove('active'));
    };

    window.onload = () => {
      load_saved_application_data();
      application_state.start_of_current_week = calculate_monday_of_target_week(new Date());
      initialize_color_selection_palette();
      render_entire_application_interface();
      setTimeout(scroll_interface_to_current_time_slot, 100);
    };

  </script>
</body>

</html>
